services:
  - type: web
    name: cohort15-lofi-mvp
    runtime: node
    plan: starter
    branch: codex/do-not-merge-lofi-mvp
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: COHORT15_LOFI_APP_ENV
        value: production
      - key: COHORT15_LOFI_APP_URL
        value: https://cohort15.com
      - key: COHORT15_LOFI_GA_MEASUREMENT_ID
        value: G-LF22TLDSBV
